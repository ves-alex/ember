<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="60%" r="55%">
      <stop offset="0%" stop-color="#2a2018"/>
      <stop offset="100%" stop-color="#15171a"/>
    </radialGradient>
    <linearGradient id="flame" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fff0d4"/>
      <stop offset="25%" stop-color="#ffb070"/>
      <stop offset="55%" stop-color="#ff8c42"/>
      <stop offset="90%" stop-color="#c66a31"/>
    </linearGradient>
    <radialGradient id="ember" cx="50%" cy="78%" r="35%">
      <stop offset="0%" stop-color="#ffd49a"/>
      <stop offset="60%" stop-color="#ff8c42" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff8c42" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="100" fill="url(#bgGlow)"/>

  <!-- Lueur sous la flamme -->
  <ellipse cx="256" cy="380" rx="120" ry="38" fill="url(#ember)"/>

  <!-- Flamme principale -->
  <path d="
    M256 96
    C 296 152, 332 196, 332 248
    C 332 280, 312 304, 296 312
    C 308 296, 312 280, 308 264
    C 296 236, 268 220, 264 188
    C 244 224, 224 240, 208 272
    C 196 296, 196 320, 212 336
    C 188 328, 168 304, 168 264
    C 168 216, 220 168, 256 96 Z
  " fill="url(#flame)"/>

  <!-- Lueur centrale (cœur de la braise) -->
  <ellipse cx="256" cy="312" rx="22" ry="34" fill="#fff0d4" opacity="0.55"/>
</svg>
