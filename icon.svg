<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fond graphite arrondi (cohérent Nudge + iOS PWA icon) -->
  <rect width="512" height="512" rx="100" fill="#15171a"/>

  <!-- Yin-yang : ambre (cigarette, bulb en haut) + vert tilleul (pastille,
       bulb en bas). Représente les 2 modes possibles dès l'icône.
       Paths canoniques adaptés de Wikipedia (yin-yang.svg) :
       centre (256, 256), grand rayon 180, petits rayons 90.
       Le grand cercle vert sert de fond, l'ambre est dessiné par-dessus. -->

  <!-- Moitié verte (yin classique = bulb en bas) : fond plein vert -->
  <circle cx="256" cy="256" r="180" fill="#6abf69"/>

  <!-- Moitié ambre (yang classique = bulb en haut) par-dessus -->
  <path d="M 256,76
           A 90,90 0 0,1 256,256
           A 90,90 0 0,0 256,436
           A 180,180 0 0,1 256,76 Z"
        fill="#ff8c42"/>

  <!-- Œil vert dans la bulb ambre (en haut) -->
  <circle cx="256" cy="166" r="25" fill="#6abf69"/>

  <!-- Œil ambre dans la bulb verte (en bas) -->
  <circle cx="256" cy="346" r="25" fill="#ff8c42"/>
</svg>
