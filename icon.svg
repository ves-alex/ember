<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fond graphite arrondi : il sera visible dans la zone "ouverte" en bas
       du logo, formant le cercle sombre que cherchait Alex. -->
  <rect width="512" height="512" rx="100" fill="#15171a"/>

  <!-- Logo "deux moitiés ouvertes" : un croissant ambre à gauche-haut,
       un croissant vert à droite-haut, qui laissent voir le fond graphite
       dans le bas via une découpe circulaire. Au centre du fond, l'œil
       ambre vient comme une braise persistante.
       Centre (256, 256), grand R=180, petits r=90. -->

  <!-- Croissant ambre (gauche, bulb en haut) -->
  <path d="M 256,76 A 180,180 0 0,0 256,436 A 90,90 0 0,1 256,256 A 90,90 0 0,0 256,76 Z"
        fill="#ff8c42"/>

  <!-- Croissant vert (droite, bulb en haut) -->
  <path d="M 256,76 A 180,180 0 0,1 256,436 A 90,90 0 0,0 256,256 A 90,90 0 0,1 256,76 Z"
        fill="#6abf69"/>

  <!-- Petite braise ambre au centre du cercle sombre en bas -->
  <circle cx="256" cy="346" r="22" fill="#ff8c42"/>
</svg>
